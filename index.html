<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title><center>Login con Google</center></title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <h1>Inicia sesión en mi página</h1>

    <div id="g_id_onload"
         data-client_id="720907761269-r3j5mmfmjk81nd6nr1lnbkodgg94k1n4.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    
    <div class="g_id_signin" data-type="standard"></div>

    <script>
        // 3. La función que recibe la información cuando el usuario se loguea
        function handleCredentialResponse(response) {
            console.log("¡Logueado con éxito!");
            // Este es un token seguro (JWT) que contiene los datos del usuario
            console.log("Token de Google: " + response.credential);
            
            // TODO: Enviar response.credential a tu servidor para validarlo
        }
    </script>
</body>
</html>
