<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Empleados</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <section id="login-screen" class="container">
        <h1>Iniciar Sesión</h1>
        <button id="btn-google-login" class="btn-google">
            <img src="img/google.jpg" alt="Google logo" width="20">
            Iniciar sesión con Google
        </button>
        <p>¿No tienes cuenta? <a href="#" id="go-to-register">Regístrate aquí</a></p>
    </section>

    <section id="register-screen" class="container hidden">
        <h1>Registro de Empleado</h1>
        <form id="register-form">
            <input type="text" id="reg-id" placeholder="ID Empleado (Ej: EMP-2026)" required>
            <input type="text" id="reg-nombre" placeholder="Nombre" required>
            <input type="text" id="reg-apellido" placeholder="Apellido" required>
            <input type="email" id="reg-correo" placeholder="Correo Electrónico" required>
            <input type="number" id="reg-sueldo" placeholder="Sueldo" step="0.01" required>
            
            <button type="submit" class="btn-submit">Registrar Usuario</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="#" id="go-to-login">Inicia sesión</a></p>
    </section>

    <section id="dashboard-screen" class="container hidden">
        <header class="dashboard-header">
            <h2>Panel Principal</h2>
            <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
        </header>
        
        <div class="employee-card">
            <h3>Datos del Usuario</h3>
            <p><strong>ID Empleado:</strong> <span id="emp-id">-[Cargando]-</span></p>
            <p><strong>Nombre Completo:</strong> <span id="emp-fullname">-[Cargando]-</span></p>
            <p><strong>Correo Electrónico:</strong> <span id="emp-email">-[Cargando]-</span></p>
            <p><strong>Sueldo Actual:</strong> $<span id="emp-salary">-[Cargando]-</span></p>
        </div>
    </section>

    <script src="funcion.js"></script>
</body>
</html>
